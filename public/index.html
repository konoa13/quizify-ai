<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quizify</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-grid"></div>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-icon"></div>
            <h1>Quizify</h1>
            <p class="brand-sub">Test your knowledge. Track your growth.</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Sign In</button>
            <button class="tab" onclick="showTab('signup')">Sign Up</button>
            <div class="tab-indicator" id="tab-indicator"></div>
        </div>

        <div id="login-form" class="form-group">
            <div class="input-wrap">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="input-wrap">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="login()">Sign In</button>
            <p id="login-msg" class="msg"></p>
        </div>

        <div id="signup-form" class="form-group" style="display:none">
            <div class="input-wrap">
                <label>Username</label>
                <input type="text" id="signup-username" placeholder="yourname">
            </div>
            <div class="input-wrap">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com">
            </div>
            <div class="input-wrap">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="signup()">Create Account</button>
            <p id="signup-msg" class="msg"></p>
        </div>
    </div>
</div>

<script>
    function showTab(tab) {
        document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
        document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
        });
        document.getElementById('tab-indicator').style.transform =
            tab === 'login' ? 'translateX(0)' : 'translateX(100%)';
    }

    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const btn = document.querySelector('#login-form .btn-primary');
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) window.location.href = '/quiz.html';
        else {
            document.getElementById('login-msg').textContent = data.error;
            btn.textContent = 'Sign In';
            btn.disabled = false;
        }
    }

    async function signup() {
        const username = document.getElementById('signup-username').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const btn = document.querySelector('#signup-form .btn-primary');
        btn.textContent = 'Creating...';
        btn.disabled = true;
        const res = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
            document.getElementById('signup-msg').style.color = '#4ade80';
            document.getElementById('signup-msg').textContent = 'Account created! Please sign in.';
        } else {
            document.getElementById('signup-msg').textContent = data.error;
        }
        btn.textContent = 'Create Account';
        btn.disabled = false;
    }
</script>
</body>
</html>
